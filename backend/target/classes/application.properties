# Application
spring.application.name=campus-lost-found

# Server
server.port=8080
server.servlet.context-path=/api

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/campus_lostandfound
# Use embedded MongoDB locally by default when no remote MongoDB URI is provided.
spring.mongodb.embedded.version=6.0.8

# JWT
app.jwt.secret=${JWT_SECRET:campus-lost-found-super-secret-key-must-be-at-least-256-bits-long!}
app.jwt.expiration=86400000

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# Logging
logging.level.root=INFO
logging.level.com.campus=DEBUG
